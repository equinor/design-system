version: 2
updates:
  - package-ecosystem: npm
    directory: /
    commit-message:
      prefix: 'chore(deps)'
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Oslo
    groups:
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      react-aria:
        patterns:
          - 'react-aria'
          - '@react-aria/*'
          - '@react-stately/*'
          - '@react-types/*'
          - '@internationalized/*'
      rollup:
        patterns:
          - 'rollup'
          - '@rollup/*'
          - 'rollup-plugin-*'
      tanstack:
        patterns:
          - '@tanstack/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@typescript-eslint/*'
          - '@eslint/*'
      testing:
        patterns:
          - 'jest'
          - 'jest-*'
          - '@testing-library/*'
          - '@types/jest'
          - '@playwright/test'
      all-dependencies:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint-*'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@typescript-eslint/*'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@eslint/*'
        update-types:
          - 'version-update:semver-major'
    cooldown:
      default-days: 5
    versioning-strategy: increase
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: 'chore(deps)'
    schedule:
      interval: weekly
      day: monday
      time: '05:00'
      timezone: Europe/Oslo
    groups:
      all-actions:
        patterns:
          - '*'
        update-types:
          - major
          - minor
          - patch
