# Reusable setup workflow for EDS CI/CD pipelines.
# Checks out code, installs dependencies, and caches the workspace.
#
# Changes from legacy version:
# - Replaced manual sparse checkout (raw git commands) with actions/checkout@v6
# - Uses pnpm-lock.yaml hash for cache key (instead of github.sha which never hits)
# - Uses --frozen-lockfile instead of --force for faster, safer installs
# - Simplified tag resolution logic

name: _Setup
on:
  workflow_call:
    inputs:
      tag:
        description: 'npm publish tag (defaults to "next")'
        type: string
        required: false
      cacheKey:
        description: 'Cache key for workspace artifacts'
        type: string
        required: true
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
    outputs:
      tag:
        description: 'Package tag'
        value: ${{ jobs.setup.outputs.tag }}
permissions:
  contents: read

env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  NODE_VERSION: '24.16.0'

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Resolve package tag
        id: resolve-tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "tag=${TAG:-next}" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Debug environment
        if: runner.debug == '1'
        run: |
          echo "pnpm version: $(pnpm --version)"
          echo "node version: $(node --version)"
          echo "lockfile head: $(head -1 pnpm-lock.yaml)"
          echo "lockfile lines: $(wc -l < pnpm-lock.yaml)"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache workspace
        uses: actions/cache/save@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ inputs.cacheKey }}

      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: ${{ github.event.pull_request.head.repo.fork == false && failure() }}
