name: Close stale needs-info issues

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/stale@v9
        with:
          only-labels: needs-info
          stale-issue-label: needs-info
          days-before-issue-stale: 2
          days-before-issue-close: 0
          remove-issue-stale-when-updated: true
          close-issue-message: |
            Closing this issue because the requested information was not provided within 48 hours.

            If you'd like to continue, please reopen the issue and add the missing details (or comment here and a maintainer can reopen it for you).
          # PRs are not handled by this workflow
          days-before-pr-stale: -1
          days-before-pr-close: -1
