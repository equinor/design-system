name: Publish assets to cdn
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment for the cdn'
        required: false
        type: choice
        options:
          - development
          - production
        default: 'development'
permissions:
  contents: read
  id-token: write
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  copy-files:
    name: Copy files from GitHub to cdn
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout cdn repo 🛎️
        id: checkout-cdn-repo
        uses: actions/checkout@v6
        with:
          repository: 'equinor/design-system-cdn'
          ref: main
          ssh-key: ${{ secrets.TEST_GITHUB_CDN_ACCESS }}
      - name: Az CLI login 🔑 # Using federated credential
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          allow-no-subscriptions: true
      - name: Upload files 📂
        id: upload-files
        uses: azure/CLI@v3
        with:
          inlineScript: |
            az storage blob sync -c ${{ vars.AZURE_CDN_CONTAINER_NAME }} -s assets --account-name ${{ vars.AZURE_CDN_STORAGE_ACCOUNT_NAME }}
      - name: logout 🔓
        run: |
          az logout
        if: always()
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  purge-cdn:
    if: github.event.inputs.environment == 'production'
    needs: [copy-files]
    name: Purge cdn
    uses: ./.github/workflows/_purge_cdn.yaml
    secrets: inherit
    with:
      environment: production
      endpoint: artefacts
