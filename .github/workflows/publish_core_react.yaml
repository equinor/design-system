name: Publish core-react
permissions:
  contents: read
  id-token: write
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: 'Tag for npm package (next | latest | beta)'
        required: true
        type: choice
        options:
          - next
          - latest
          - beta
        default: 'next'
      environment:
        description: 'Environment for Storybook (development | production)'
        required: false
        type: choice
        options:
          - development
          - production
        default: 'development'
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  NODE_VERSION: '22.12.0'
  CACHE_KEY: ${{ github.sha }}-publish-core-react

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/_setup.yml
    secrets: inherit
    with:
      cacheKey: ${{ github.sha }}-publish-core-react
      tag: ${{ github.event.inputs.npm-tag }}

  build:
    name: Build packages & Storybook
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Build packages
        run: pnpm run build
      - name: Build Storybook
        run: pnpm build:storybook
      - name: Cache build output
        uses: actions/cache/save@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-utils:
    name: Publish utils to npm
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Publish to npm
        run: |
          pnpm config set '//registry.npmjs.org/:_authToken' ${{ secrets.NPM_TOKEN }}
          pnpm --filter @equinor/eds-utils publish --access public --tag ${{ github.event.inputs.npm-tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-core:
    name: Publish core-react to npm
    runs-on: ubuntu-latest
    needs: publish-utils
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Set beta version from version.txt
        if: github.event.inputs.npm-tag == 'beta'
        run: |
          BETA_VERSION=$(cat packages/eds-core-react/src/components/next/version.txt | tr -d '[:space:]')
          echo "Beta version: $BETA_VERSION"
          cd packages/eds-core-react
          npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
          echo "Updated package.json version to $BETA_VERSION"

      - name: Add /next exports for beta release
        if: github.event.inputs.npm-tag == 'beta'
        run: |
          cd packages/eds-core-react
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.exports['./next'] = {
              types: './dist/types/index.next.d.ts',
              import: './dist/esm-next/index.next.js',
              require: './dist/index.next.cjs'
            };
            pkg.exports['./next/index.css'] = './build/index.css';
            pkg.exports['./next/index.min.css'] = './build/index.min.css';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Added /next exports to package.json');
          "
          echo "Updated exports:"
          cat package.json | grep -A 15 '"exports"'

      - name: Publish to npm
        run: |
          pnpm config set '//registry.npmjs.org/:_authToken' ${{ secrets.NPM_TOKEN }}
          pnpm --filter @equinor/eds-core-react publish --access public --tag ${{ github.event.inputs.npm-tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-storybook:
    name: Deploy Storybook
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.environment || 'development' }}
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Deploy the website
        uses: tibor19/static-website-deploy@v4
        with:
          enabled-static-website: 'true'
          folder: 'packages/eds-core-react/storybook-build'
          public-access-policy: 'container'
          connection-string: ${{ secrets.AZ_STORYBOOK_CONNECTION_STRING }}
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  purge-cdn:
    # Only purge CDN for production releases (latest tag)
    if: github.event.inputs.npm-tag == 'latest'
    needs: publish-storybook
    name: Purge cdn
    uses: ./.github/workflows/_purge_cdn.yaml
    secrets: inherit
    with:
      environment: production
      endpoint: storybook
