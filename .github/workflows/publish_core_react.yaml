name: Publish core-react
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: 'Tag for npm package (next | latest | beta)'
        required: true
        type: choice
        options:
          - next
          - latest
          - beta
        default: 'next'
permissions:
  contents: read
  id-token: write
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  setup:
    uses: ./.github/workflows/_setup.yml
    secrets: inherit
    with:
      cacheKey: ${{ github.sha }}
      checkout_paths: packages scripts
      tag: ${{ github.event.inputs.npm-tag }}
  packages:
    name: Process packages
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Use "setup" cache
        id: setup-cache
        uses: actions/cache@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-core-react
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Build packages
        id: build-packages
        run: pnpm run build
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
  publish-utils-package:
    name: Publish utils to npm
    runs-on: ubuntu-latest
    needs: [packages, setup]
    steps:
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-core-react
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      # Skip on beta runs — eds-utils has no beta channel
      - name: Publish to npm
        id: publish-to-npm
        if: needs.setup.outputs.tag != 'beta'
        run: |
          pnpm config set '//registry.npmjs.org/:_authToken' ${{ secrets.NPM_TOKEN }}
          pnpm --filter @equinor/eds-utils publish --access public --tag ${{ needs.setup.outputs.tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
  publish-core-package:
    name: Publish core-react to npm
    runs-on: ubuntu-latest
    needs: [publish-utils-package, setup]
    steps:
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-core-react
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Set beta version from version.txt
        if: github.event.inputs.npm-tag == 'beta'
        id: set-beta-version
        run: |
          BETA_VERSION=$(cat packages/eds-core-react/src/components/next/version.txt | tr -d '[:space:]')
          echo "Beta version: $BETA_VERSION"
          cd packages/eds-core-react
          npm version "$BETA_VERSION" --no-git-tag-version --allow-same-version
          echo "Updated package.json version to $BETA_VERSION"
      - name: Add /next exports for beta release
        if: github.event.inputs.npm-tag == 'beta'
        id: add-next-exports
        run: |
          cd packages/eds-core-react
          # Add /next exports to package.json for beta releases
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.exports['./next'] = {
              types: './dist/types/index.next.d.ts',
              import: './dist/esm-next/index.next.js',
              require: './dist/index.next.cjs'
            };
            pkg.exports['./next/index.css'] = './build/index.css';
            pkg.exports['./next/index.min.css'] = './build/index.min.css';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('Added /next exports to package.json');
          "
          echo "Updated exports:"
          cat package.json | grep -A 15 '"exports"'
      - name: Publish to npm
        id: publish-to-npm
        run: |
          pnpm config set '//registry.npmjs.org/:_authToken' ${{ secrets.NPM_TOKEN }}
          pnpm --filter @equinor/eds-core-react publish --access public --tag ${{ needs.setup.outputs.tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
