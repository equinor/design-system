# TODO: Create a composite action for publishing to simplify things
name: Publish lab-react
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: 'Tag for npm package (next | latest)'
        required: true
        type: choice
        options:
          - next
          - latest
        default: 'next'
      environment:
        description: 'Environment for Storybook (development | production)'
        required: false
        type: choice
        options:
          - development
          - production
        default: 'development'
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  setup:
    uses: ./.github/workflows/_setup.yml
    secrets: inherit
    with:
      cacheKey: ${{ github.sha }}-setup-lab
      checkout_paths: packages scripts
      tag: ${{ github.event.inputs.npm-tag }}
  packages:
    name: Process packages
    runs-on: ubuntu-latest
    needs: [setup]
    steps:
      - name: Use "setup" cache
        id: setup-cache
        uses: actions/cache@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-setup-lab
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-${{ github.event.inputs.environment }}-lab
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.16.0'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Build packages
        id: build-packages
        run: pnpm run build
      - name: Build lab Storybook
        id: build-storybook
        run: pnpm build:storybook:lab
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
  publish-utils-package:
    name: Publish utils to npm
    runs-on: ubuntu-latest
    needs: [packages, setup]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-${{ github.event.inputs.environment }}-lab
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Publish to npm
        id: publish-to-npm
        working-directory: packages/eds-utils
        run: pnpm publish --access public --provenance --tag ${{ needs.setup.outputs.tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
  publish-lab-package:
    name: Publish lab to npm
    runs-on: ubuntu-latest
    needs: [publish-utils-package, setup]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Use "dist" cache
        id: dist-cache
        uses: actions/cache@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-${{ github.event.inputs.environment }}-lab
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
      - name: Publish to npm
        id: publish-to-npm
        working-directory: packages/eds-lab-react
        run: pnpm publish --access public --provenance --tag ${{ needs.setup.outputs.tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
  publish-storybook:
    needs: [setup, packages]
    name: Publish Storybook
    runs-on: ubuntu-latest
    steps:
      # The setup job's sparse checkout only includes packages/apps/scripts
      # (and the workspace cache glob skips dot-directories), so .github and
      # the local deploy action must be checked out here. Must stay the first
      # step: checkout cleans the workspace and would wipe the restored
      # storybook build otherwise.
      - name: Checkout deploy action
        uses: actions/checkout@v7
        with:
          sparse-checkout: .github
      - name: Use cache with storybook files
        id: use-cache-storybook
        uses: actions/cache@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ github.sha }}-dist-${{ github.event.inputs.environment }}-lab
      - name: Deploy the website
        id: deploy-website
        uses: ./.github/actions/deploy-storybook
        with:
          folder: packages/eds-lab-react/storybook-build
          connection-string: ${{ secrets.AZ_STORAGE_STORYBOOK_LAB_CONNECTION_STRING }}
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
