name: Publish lab-react
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: 'Tag for npm package (next | latest)'
        required: true
        type: choice
        options:
          - next
          - latest
        default: 'next'
      environment:
        description: 'Environment for Storybook (development | production)'
        required: false
        type: choice
        options:
          - development
          - production
        default: 'development'
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  NODE_VERSION: '24.16.0'
  CACHE_KEY: ${{ github.sha }}-publish-lab

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/_setup.yml
    secrets: inherit
    with:
      cacheKey: ${{ github.sha }}-publish-lab
      tag: ${{ github.event.inputs.npm-tag }}

  build:
    name: Build packages & Storybook
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Build packages
        run: pnpm run build
      - name: Build lab Storybook
        run: pnpm build:storybook:lab
      - name: Cache build output
        uses: actions/cache/save@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-utils:
    name: Publish utils to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Publish to npm
        run: pnpm --filter @equinor/eds-utils publish --access public --provenance --tag ${{ github.event.inputs.npm-tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-lab:
    name: Publish lab to npm
    runs-on: ubuntu-latest
    needs: publish-utils
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Publish to npm
        run: pnpm --filter @equinor/eds-lab-react publish --access public --provenance --tag ${{ github.event.inputs.npm-tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish-storybook:
    name: Publish Storybook
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Deploy the website
        uses: tibor19/static-website-deploy@v4
        with:
          enabled-static-website: 'true'
          folder: 'packages/eds-lab-react/storybook-build'
          public-access-policy: 'container'
          connection-string: ${{ secrets.AZ_STORAGE_STORYBOOK_LAB_CONNECTION_STRING }}
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
