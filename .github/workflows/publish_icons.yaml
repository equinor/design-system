name: Publish icons
permissions:
  contents: read
on:
  workflow_dispatch:
    inputs:
      npm-tag:
        description: 'Tag for npm package (next | latest)'
        required: true
        type: choice
        options:
          - next
          - latest
        default: 'next'
env:
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  NODE_VERSION: '24.16.0'
  CACHE_KEY: ${{ github.sha }}-publish-icons

jobs:
  setup:
    name: Setup
    uses: ./.github/workflows/_setup.yml
    secrets: inherit
    with:
      cacheKey: ${{ github.sha }}-publish-icons
      tag: ${{ github.event.inputs.npm-tag }}

  build:
    name: Build packages
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Restore workspace cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Build packages
        run: pnpm run build
      - name: Cache build output
        uses: actions/cache/save@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()

  publish:
    name: Publish icons to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Restore build cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ./*
            ~/.pnpm-store
          key: ${{ env.CACHE_KEY }}-built
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Publish to npm
        run: pnpm --filter ./packages/eds-icons publish --access public --provenance --tag ${{ github.event.inputs.npm-tag }} --no-git-checks
      - name: log-errors-to-slack
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          steps: ${{ toJson(steps) }}
        if: failure()
